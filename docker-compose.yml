services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: er_db
      POSTGRES_USER: er_user
      POSTGRES_PASSWORD: er_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U er_user -d er_db"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: Emergency Room API
      DEBUG: "false"
      SECRET_KEY: change-this-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      DATABASE_URL: postgresql+psycopg://er_user:er_password@db:5432/er_db
      CORS_ORIGINS: http://localhost:3000
      RATE_LIMIT: 100/minute
    ports:
      - "8000:8000"

volumes:
  pgdata:
